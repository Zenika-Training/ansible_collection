---
- name: Day-1 OpenShift cluster configuration
  hosts: "{{ ansible_limit | default('sno') }}"
  vars:
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
  tasks:
    - name: Configure authentication and RBAC
      ansible.builtin.include_role:
        name: zenika.training.ocp_init

    - name: Install MetalLB
      ansible.builtin.include_role:
        name: zenika.training.metallb
      when: metallb_ip_ranges is defined and metallb_ip_ranges | length > 0
