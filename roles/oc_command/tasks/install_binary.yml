---
- name: "Check current version of {{ _oc_binary.name }}"
  ansible.builtin.command:
    cmd: "/usr/local/bin/{{ _oc_binary.name }} {{ _oc_binary.version_arg }}"
  register: _oc_binary_version_result
  failed_when: false
  changed_when: false

- name: "Set installed version to empty for {{ _oc_binary.name }}"
  ansible.builtin.set_fact:
    _oc_binary_installed_version: ""

- name: "Set installed version from binary for {{ _oc_binary.name }}"
  ansible.builtin.set_fact:
    _oc_binary_installed_version: >-
      {{ _oc_binary_version_result.stdout
         | regex_search('(\d+\.\d+\.\d+)', '\1')
         | first | default('') }}
  when: _oc_binary_version_result.rc == 0 and _oc_binary_version_result.stdout != ''

- name: "Download and install of {{ _oc_binary.name }}"
  become: true
  ansible.builtin.unarchive:
    src: "{{ _oc_binary.url }}"
    dest: /usr/local/bin/
    owner: root
    group: root
    mode: "0755"
    remote_src: true
  when: _oc_binary_installed_version != oc_command_version

- name: "Bash completion for {{ _oc_binary.name }}"
  become: true
  ansible.builtin.shell:
    cmd: "(/usr/local/bin/{{ _oc_binary.name }} completion bash) > /etc/profile.d/{{ _oc_binary.name }}.sh"
  when: _oc_binary_installed_version != oc_command_version
