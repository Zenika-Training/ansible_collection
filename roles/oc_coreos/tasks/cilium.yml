---
- name: Cilium — generate manifests
  ansible.builtin.command:
    cmd: "/usr/local/bin/openshift-install --dir={{ oc_coreos_work_dir }}/{{ oc_coreos_ocp_name }} create manifests"
  changed_when: true

- name: Cilium — download manifests archive
  ansible.builtin.get_url:
    url: "{{ oc_coreos_cilium_manifests_url }}"
    dest: "{{ oc_coreos_work_dir }}/cilium-manifests.tar.gz"
    mode: "0644"

- name: Cilium — extract manifests archive into ignition directory
  ansible.builtin.unarchive:
    src: "{{ oc_coreos_work_dir }}/cilium-manifests.tar.gz"
    dest: "{{ oc_coreos_work_dir }}/{{ oc_coreos_ocp_name }}/manifests/"
    remote_src: true
    extra_opts:
      - --strip-components=1

- name: Cilium — read cluster-network-02-config.yml
  ansible.builtin.slurp:
    src: "{{ oc_coreos_work_dir }}/{{ oc_coreos_ocp_name }}/manifests/cluster-network-02-config.yml"
  register: _oc_coreos_cn02_raw

- name: "Cilium — patch cluster-network-02-config.yml (deployKubeProxy: false)"
  ansible.builtin.copy:
    content: "{{ _oc_coreos_cn02_raw.content | b64decode | from_yaml | combine({'spec': {'deployKubeProxy': false}}, recursive=True) | to_nice_yaml(indent=2) }}"
    dest: "{{ oc_coreos_work_dir }}/{{ oc_coreos_ocp_name }}/manifests/cluster-network-02-config.yml"
    mode: "0644"

- name: Cilium — read clife controller Deployment
  ansible.builtin.slurp:
    src: "{{ oc_coreos_work_dir }}/{{ oc_coreos_ocp_name }}/manifests/apps_v1_deployment_clife-controller-manager.yaml"
  register: _oc_coreos_clife_deploy_raw

- name: Cilium — patch clife controller Deployment (KUBERNETES_SERVICE_HOST/PORT)
  vars:
    _oc_coreos_deploy: "{{ _oc_coreos_clife_deploy_raw.content | b64decode | from_yaml }}"
    _oc_coreos_container: "{{ _oc_coreos_deploy.spec.template.spec.containers[0] }}"
    _oc_coreos_env_patch:
      - name: KUBERNETES_SERVICE_HOST
        value: "api-int.{{ oc_coreos_ocp_name }}.{{ oc_coreos_ocp_domain }}"
      - name: KUBERNETES_SERVICE_PORT
        value: "6443"
  ansible.builtin.copy:
    content: >-
      {{ _oc_coreos_deploy | combine({
           'spec': {
             'template': {
               'spec': {
                 'containers': [
                   _oc_coreos_container | combine({'env': _oc_coreos_container.env + _oc_coreos_env_patch})
                 ]
               }
             }
           }
         }, recursive=True) | to_nice_yaml(indent=2) }}
    dest: "{{ oc_coreos_work_dir }}/{{ oc_coreos_ocp_name }}/manifests/apps_v1_deployment_clife-controller-manager.yaml"
    mode: "0644"

- name: Cilium — read subscription.yaml
  ansible.builtin.slurp:
    src: "{{ oc_coreos_work_dir }}/{{ oc_coreos_ocp_name }}/manifests/subscription.yaml"
  register: _oc_coreos_subscription_raw

- name: Cilium — patch subscription.yaml (KUBERNETES_SERVICE_HOST/PORT)
  ansible.builtin.copy:
    content: >-
      {{ _oc_coreos_subscription_raw.content | b64decode | from_yaml | combine({
           'spec': {
             'config': {
               'env': [
                 {'name': 'KUBERNETES_SERVICE_HOST',
                  'value': 'api-int.' + oc_coreos_ocp_name + '.' + oc_coreos_ocp_domain},
                 {'name': 'KUBERNETES_SERVICE_PORT', 'value': '6443'}
               ]
             }
           }
         }, recursive=True) | to_nice_yaml(indent=2) }}
    dest: "{{ oc_coreos_work_dir }}/{{ oc_coreos_ocp_name }}/manifests/subscription.yaml"
    mode: "0644"

- name: Cilium — read CiliumConfig manifest
  ansible.builtin.slurp:
    src: "{{ oc_coreos_work_dir }}/{{ oc_coreos_ocp_name }}/manifests/ciliumconfig.yaml"
  register: _oc_coreos_cilium_config_raw

- name: Cilium — patch CiliumConfig
  ansible.builtin.copy:
    content: >-
      {{ _oc_coreos_cilium_config_raw.content | b64decode | from_yaml | combine({
           'spec': {
             'kubeProxyReplacement': true,
             'k8sServiceHost': 'api-int.' + oc_coreos_ocp_name + '.' + oc_coreos_ocp_domain,
             'k8sServicePort': 6443,
             'ipam': {
               'operator': {
                 'clusterPoolIPv4PodCIDRList': [oc_coreos_cluster_network_cidr]
               }
             },
             'cni': {
               'exclusive': oc_coreos_cilium_cni_exclusive
             },
             'bpf': {
               'masquerade': oc_coreos_cilium_bpf_masquerade
             }
           }
         }, recursive=True) | to_nice_yaml(indent=2) }}
    dest: "{{ oc_coreos_work_dir }}/{{ oc_coreos_ocp_name }}/manifests/ciliumconfig.yaml"
    mode: "0644"
