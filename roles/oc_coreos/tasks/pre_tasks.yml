---
- name: Validate pull secret file path is set
  ansible.builtin.assert:
    that: oc_coreos_pull_secret_file | length > 0
    fail_msg: "oc_coreos_pull_secret_file must be set (download from: https://console.redhat.com/openshift/create/local)"

- name: Check pull secret file exists
  ansible.builtin.stat:
    path: "{{ oc_coreos_pull_secret_file }}"
  register: _oc_coreos_pull_secret_stat

- name: Assert pull secret file exists
  ansible.builtin.assert:
    that: _oc_coreos_pull_secret_stat.stat.exists
    fail_msg: "Pull secret file not found: {{ oc_coreos_pull_secret_file }}"

- name: Validate SSH key file path is set
  ansible.builtin.assert:
    that: oc_coreos_ssh_key_file | length > 0
    fail_msg: "oc_coreos_ssh_key_file must be set"

- name: Check SSH key file exists
  ansible.builtin.stat:
    path: "{{ oc_coreos_ssh_key_file }}"
  register: _oc_coreos_ssh_key_stat

- name: Assert SSH key file exists
  ansible.builtin.assert:
    that: _oc_coreos_ssh_key_stat.stat.exists
    fail_msg: "SSH key file not found: {{ oc_coreos_ssh_key_file }}"

- name: Validate OCP IP is defined
  ansible.builtin.assert:
    that: oc_coreos_ocp_ip | length > 0
    fail_msg: "oc_coreos_ocp_ip must be set"

- name: Check DNS records
  ansible.builtin.assert:
    that: lookup('community.general.dig', item.query) not in ['', 'NXDOMAIN']
    fail_msg: "Missing DNS record: {{ item.label }}"
  loop:
    - query: "{{ oc_coreos_ocp_ip }}/PTR"
      label: "PTR {{ oc_coreos_ocp_ip }}"
    - query: "api.{{ oc_coreos_ocp_name }}.{{ oc_coreos_ocp_domain }}"
      label: "api.{{ oc_coreos_ocp_name }}.{{ oc_coreos_ocp_domain }}"
    - query: "api-int.{{ oc_coreos_ocp_name }}.{{ oc_coreos_ocp_domain }}"
      label: "api-int.{{ oc_coreos_ocp_name }}.{{ oc_coreos_ocp_domain }}"
    - query: "random.apps.{{ oc_coreos_ocp_name }}.{{ oc_coreos_ocp_domain }}"
      label: "*.apps.{{ oc_coreos_ocp_name }}.{{ oc_coreos_ocp_domain }}"
  loop_control:
    label: "{{ item.label }}"

- name: Load pull secret from file
  ansible.builtin.set_fact:
    _oc_coreos_pull_secret: "{{ lookup('file', oc_coreos_pull_secret_file) | from_json | to_json }}"

- name: Load SSH public key from file
  ansible.builtin.set_fact:
    _oc_coreos_ssh_key: "{{ lookup('file', oc_coreos_ssh_key_file) | trim }}"
