---
# @section VM identity

# @var libvirt_kvm_name:description: Name of the VM. Defaults to the Ansible inventory hostname.
libvirt_kvm_name: "{{ inventory_hostname }}"

# @var libvirt_kvm_iso_src:description: >
# Path to the RHCOS live ISO on the host identified by libvirt_kvm_iso_host.
# @end
libvirt_kvm_iso_src: "/tmp/openshift/{{ libvirt_kvm_name }}/rhcos-live.iso"

# @var libvirt_kvm_iso_host:description: >
# Host where the source ISO resides. Defaults to localhost (Ansible controller).
# Set to the KVM host name when the ISO was generated directly on the KVM host
# (e.g. libvirt_kvm_iso_host: "{{ libvirt_kvm_target_host }}").
# Controls both where the pre-check stat runs and whether the copy uses remote_src.
# @end
libvirt_kvm_iso_host: localhost

# @section Compute resources

# @var libvirt_kvm_memory:description: RAM allocated to the VM, in MiB.
libvirt_kvm_memory: 32768

# @var libvirt_kvm_vcpus:description: Number of virtual CPUs.
libvirt_kvm_vcpus: 8

# @var libvirt_kvm_cpu_model:description: CPU model passed to libvirt. host-model exposes all host CPU features.
libvirt_kvm_cpu_model: host-model

# @section LVM storage

# @var libvirt_kvm_vg_pool:description: LVM volume group used to create the VM disk.
libvirt_kvm_vg_pool: vg_guest

# @var libvirt_kvm_disk_size:description: Size of the VM disk in virt-install format (e.g. 120g).
libvirt_kvm_disk_size: 120g

# @section Network

# @var libvirt_kvm_bridge:description: Linux bridge interface on the KVM host used for the VM network.
libvirt_kvm_bridge: br0

# @var libvirt_kvm_mac:description: >
# MAC address of the VM NIC. Required - must be set in host_vars or inventory.
# Used to ensure a predictable static IP via DHCP or DNS.
# @end
libvirt_kvm_mac: ""

# @var libvirt_kvm_iso_dest_dir:description: Directory on the KVM host where the ISO is copied before boot.
libvirt_kvm_iso_dest_dir: /var/lib/libvirt/images

# @var libvirt_kvm_target_host:description: >
# Ansible inventory hostname of the KVM host. Tasks that must run on the KVM host
# are delegated to this host. Override in group_vars with the actual KVM server hostname.
# @end
libvirt_kvm_target_host: localhost

# @section First-boot wait

# @var libvirt_kvm_first_boot_retries:description: >
# Number of status polls before giving up on the first-boot installation.
# Each poll waits libvirt_kvm_first_boot_delay seconds.
# Total maximum wait = retries × delay. Default: 120 × 30s = 60 minutes.
# OCP 4.21+ requires more time due to automatic CPU/memory sizing (autoSizingReserved).
# @end
libvirt_kvm_first_boot_retries: 120

# @var libvirt_kvm_first_boot_delay:description: Seconds between each VM status poll during first-boot wait.
libvirt_kvm_first_boot_delay: 30

# @section Guest OS

# @var libvirt_kvm_osinfo:description: OS variant identifier passed to virt-install (--os-variant).
libvirt_kvm_osinfo: fedora-coreos-stable

# @var libvirt_kvm_graphics_type:description: Graphical display protocol for the VM console (vnc or spice).
libvirt_kvm_graphics_type: vnc

# @var libvirt_kvm_graphics_listen:description: Address on which the graphics server listens. 127.0.0.1 restricts to localhost.
libvirt_kvm_graphics_listen: 127.0.0.1
