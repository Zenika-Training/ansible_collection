---
- name: Validate VM name is defined
  ansible.builtin.assert:
    that: libvirt_kvm_name | length > 0
    fail_msg: "libvirt_kvm_name must be set"

- name: Validate MAC address is defined
  ansible.builtin.assert:
    that: libvirt_kvm_mac | length > 0
    fail_msg: "libvirt_kvm_mac must be set"

- name: Validate ISO source is defined
  ansible.builtin.assert:
    that: libvirt_kvm_iso_src | length > 0
    fail_msg: "libvirt_kvm_iso_src must be set"

- name: Validate ISO source exists
  ansible.builtin.stat:
    path: "{{ libvirt_kvm_iso_src }}"
  register: _libvirt_kvm_iso_stat
  delegate_to: "{{ libvirt_kvm_iso_host }}"

- name: Assert ISO source file exists
  ansible.builtin.assert:
    that: _libvirt_kvm_iso_stat.stat.exists
    fail_msg: "ISO source not found: {{ libvirt_kvm_iso_src }}"
