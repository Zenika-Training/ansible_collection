---
- name: Collect needed facts
  ansible.builtin.setup:
    gather_subset:
      - "!all"
      - effective_user_id
      - network
- name: Create workdir
  ansible.builtin.file:
    state: directory
    path: "{{ kind_workdir }}"
    mode: "0755"
- name: Download kind
  become: true
  ansible.builtin.get_url:
    url: "{{ kind_repo }}"
    dest: /usr/local/bin/kind
    owner: root
    group: root
    mode: "0755"
- name: Configure Kind
  ansible.builtin.template:
    src: kind.config.j2
    dest: "{{ kind_workdir }}/kind.config"
    mode: "0644"
- name: Create cluster
  ansible.builtin.command:
    cmd: "/usr/local/bin/kind create cluster --config {{ kind_workdir }}/kind.config --wait 5m"
    creates: "{{ kind_kube_config }}"
  environment:
    KIND_EXPERIMENTAL_PROVIDER: podman
