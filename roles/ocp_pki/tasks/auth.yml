---
- name: Check kubeconfig existence
  ansible.builtin.stat:
    path: "{{ ocp_pki_kubeconfig }}"
  register: _ocp_pki_kubeconfig_stat
  when: ocp_pki_kubeconfig | length > 0

# When the kubeconfig file is absent (e.g. cluster provisioned elsewhere),
# clear the variable so kubernetes.core falls back to ~/.kube/config,
# which is populated by a prior `oc login`.
- name: Fall back to current kube context when kubeconfig is absent
  ansible.builtin.set_fact:
    ocp_pki_kubeconfig: ""
  when: not (_ocp_pki_kubeconfig_stat.stat.exists | default(false))

- name: Check default kube context existence
  ansible.builtin.stat:
    path: "~/.kube/config"
  register: _ocp_pki_default_kubeconfig_stat
  when: ocp_pki_kubeconfig | length == 0

- name: Assert that a kube context is available
  ansible.builtin.assert:
    that: ocp_pki_kubeconfig | length > 0 or _ocp_pki_default_kubeconfig_stat.stat.exists | default(false)
    fail_msg: >-
      No kubeconfig found at '{{ ocp_pki_kubeconfig }}' and ~/.kube/config does not exist.
      Run `oc login <api-url>` first, or set ocp_pki_kubeconfig to a valid kubeconfig path.
