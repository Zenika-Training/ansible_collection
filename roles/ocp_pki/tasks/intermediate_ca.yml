---
- name: Ensure intermediate CA directory exists
  ansible.builtin.file:
    path: "{{ ocp_pki_intermediate_dir }}"
    state: directory
    mode: "0700"
  delegate_to: "{{ ocp_pki_controller_host }}"

- name: Generate intermediate CA private key
  community.crypto.openssl_privatekey:
    path: "{{ ocp_pki_intermediate_dir }}/ca.key"
    size: 4096
    mode: "0600"
  delegate_to: "{{ ocp_pki_controller_host }}"

- name: Create CSR for intermediate CA certificate
  community.crypto.openssl_csr_pipe:
    privatekey_path: "{{ ocp_pki_intermediate_dir }}/ca.key"
    common_name: "{{ ocp_pki_intermediate_cn }}"
    organization_name: "Zenika Training"
    use_common_name_for_san: false
    basic_constraints:
      - "CA:TRUE"
      - "pathlen:{{ ocp_pki_intermediate_pathlen }}"
    basic_constraints_critical: true
    key_usage:
      - keyCertSign
      - cRLSign
    key_usage_critical: true
  register: _ocp_pki_intermediate_csr
  delegate_to: "{{ ocp_pki_controller_host }}"
  changed_when: false

- name: Sign intermediate CA certificate with root CA
  community.crypto.x509_certificate:
    path: "{{ ocp_pki_intermediate_dir }}/ca.crt"
    csr_content: "{{ _ocp_pki_intermediate_csr.csr }}"
    provider: ownca
    ownca_path: "{{ ocp_pki_root_ca_dir }}/root-ca.crt"
    ownca_privatekey_path: "{{ ocp_pki_root_ca_dir }}/root-ca.key"
    ownca_not_after: "+{{ ocp_pki_intermediate_days }}d"
  delegate_to: "{{ ocp_pki_controller_host }}"

- name: Read intermediate CA cert
  ansible.builtin.slurp:
    src: "{{ ocp_pki_intermediate_dir }}/ca.crt"
  register: _ocp_pki_ca_cert
  delegate_to: "{{ ocp_pki_controller_host }}"

- name: Read root CA cert
  ansible.builtin.slurp:
    src: "{{ ocp_pki_root_ca_dir }}/root-ca.crt"
  register: _ocp_pki_root_cert
  delegate_to: "{{ ocp_pki_controller_host }}"

- name: Build cert-chain (intermediate + root)
  ansible.builtin.copy:
    content: "{{ (_ocp_pki_ca_cert.content | b64decode) + (_ocp_pki_root_cert.content | b64decode) }}"
    dest: "{{ ocp_pki_intermediate_dir }}/cert-chain.pem"
    mode: "0600"
  delegate_to: "{{ ocp_pki_controller_host }}"

- name: Read intermediate CA key
  ansible.builtin.slurp:
    src: "{{ ocp_pki_intermediate_dir }}/ca.key"
  register: _ocp_pki_ca_key
  delegate_to: "{{ ocp_pki_controller_host }}"
  no_log: true
