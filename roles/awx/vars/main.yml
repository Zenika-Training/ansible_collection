---
awx_admin: admin
awx_chart_version: 3.2.0
awx_config: "{{ ansible_facts.user_dir }}/.tower_cli.cfg"
awx_controller_port: 32000
awx_helm_repo: https://get.helm.sh/helm-v3.19.1-linux-amd64.tar.gz
awx_k9s_repo: https://github.com/derailed/k9s/releases/download/v0.50.16/k9s_Linux_amd64.tar.gz
awx_kind_repo: https://kind.sigs.k8s.io/dl/v0.30.0/kind-linux-amd64
awx_kube_config: "{{ ansible_facts.user_dir }}/.kube/config"
awx_kubectl_repo: https://dl.k8s.io/release/v1.32.0/bin/linux/amd64/kubectl
awx_name: awx
awx_ns: awx
awx_package: [ca-certificates, git, python3-yaml, tar, unzip]
awx_private_registry: local-registry
awx_venv_path: "{{ ansible_facts.user_dir }}/.local/pipx/venvs"
awx_workdir: "/tmp/awx"
