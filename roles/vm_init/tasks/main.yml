---
- name: Configure DPkg lock timeout
  become: true
  ansible.builtin.copy:
    content: 'DPkg::Lock::Timeout "900";'
    dest: /etc/apt/apt.conf.d/99-dpkg-timeout
    mode: "0644"
- name: Remove unattended-upgrades
  become: true
  ansible.builtin.apt:
    name: unattended-upgrades
    state: absent
    purge: true
- name: Update APT cache
  become: true
  ansible.builtin.apt:
    update_cache: true
# get_url triggers an urllib3/Python version conflict on Ubuntu 24.04 — use wget to bypass Ansible's HTTP stack
- name: Update Google APT signing key
  become: true
  ansible.builtin.command:
    cmd: wget -q -O /etc/apt/trusted.gpg.d/google.asc https://dl.google.com/linux/linux_signing_key.pub
    creates: /etc/apt/trusted.gpg.d/google.asc
